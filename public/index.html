<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TziGModZ Keygen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom glow effect matching the screenshot's accents */
        .neon-glow {
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }
    </style>
</head>
<body class="bg-[#0b0f17] text-slate-200 min-h-screen font-sans flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#131a26] border border-slate-800/80 rounded-3xl p-6 shadow-2xl relative overflow-hidden">
        
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-1 bg-green-500 rounded-full opacity-60"></div>

        <div class="text-center mb-8 mt-2">
            <h1 class="text-2xl font-black tracking-wide text-white drop-shadow-md">
                TziGModZ Keygen
            </h1>
            <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest font-semibold">Automated Generation Monitor</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-[#1b2333] border border-slate-800/60 p-4 rounded-2xl flex flex-col justify-between">
                <span class="text-xs text-slate-400 font-medium uppercase">Session Generated</span>
                <span id="totalCounter" class="text-3xl font-black text-green-400 mt-1">0</span>
            </div>
            <div class="bg-[#1b2333] border border-slate-800/60 p-4 rounded-2xl flex flex-col justify-between">
                <span class="text-xs text-slate-400 font-medium uppercase">Routine Sync</span>
                <div class="flex items-center gap-1.5 text-xs text-emerald-400 font-bold mt-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                    1m Cron Active
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5 pl-1">Latest Generated Key</label>
                <div class="w-full bg-[#1b2333] border border-slate-800 rounded-2xl px-4 py-3.5 text-center font-mono font-bold text-lg text-green-400 tracking-wider transition-all duration-300 min-h-[56px] flex items-center justify-center" id="latestKeyDisplay">
                    --- AWAITING RUN ---
                </div>
            </div>

            <div class="bg-[#1b2333]/50 rounded-xl p-3 border border-slate-800/40 text-xs space-y-1 text-slate-400 font-mono">
                <div class="flex justify-between"><span>Tier Group:</span> <span id="metaTier" class="text-slate-300 font-bold">-</span></div>
                <div class="flex justify-between"><span>Expiration:</span> <span id="metaExpires" class="text-slate-300">-</span></div>
                <div class="flex justify-between"><span>Last Checked:</span> <span id="metaTimestamp" class="text-slate-300">-</span></div>
            </div>

            <button id="generateBtn" class="w-full flex items-center justify-center gap-2 bg-green-500 hover:bg-green-400 active:scale-[0.99] text-[#0b0f17] font-bold py-4 rounded-2xl transition duration-200 shadow-lg shadow-green-500/10 neon-glow">
                <i data-lucide="refresh-cw" class="w-5 h-5" id="btnIcon"></i>
                Generate Key Now
            </button>
        </div>

        <div class="text-center mt-6 text-[10px] text-slate-500 font-mono tracking-wider">
            SYSTEM POWERED BY VERCEL & CRON-JOB
        </div>
    </div>

    <script>
        // Initialize SVG vector icons
        lucide.createIcons();

        const generateBtn = document.getElementById('generateBtn');
        const btnIcon = document.getElementById('btnIcon');
        const latestKeyDisplay = document.getElementById('latestKeyDisplay');
        const totalCounter = document.getElementById('totalCounter');
        
        // Metadata fields
        const metaTier = document.getElementById('metaTier');
        const metaExpires = document.getElementById('metaExpires');
        const metaTimestamp = document.getElementById('metaTimestamp');

        let sessionTotalCount = 0;

        async function handleKeyGenerationPipeline() {
            // Toggle visual loading states
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-75');
            btnIcon.classList.add('animate-spin');

            try {
                // Queries your relative Vercel serverless background script
                const response = await fetch('/api/generate');
                const data = await response.json();

                // Increment tracker metrics
                sessionTotalCount++;
                totalCounter.innerText = sessionTotalCount;

                const timeString = new Date().toLocaleTimeString();

                if (data.success === true) {
                    // Success UI update
                    latestKeyDisplay.innerText = data.key;
                    latestKeyDisplay.classList.remove('text-rose-400', 'text-slate-500');
                    latestKeyDisplay.classList.add('text-green-400');
                    
                    metaTier.innerText = data.tier || "FREE";
                    metaExpires.innerText = data.expires_at ? new Date(data.expires_at).toLocaleDateString() : "N/A";
                    metaTimestamp.innerText = timeString;
                } else {
                    // Handled error update (e.g. Rate-limit / Cooldown states)
                    latestKeyDisplay.innerText = data.error ? data.error.toUpperCase() : "COOLDOWN ACTIVE";
                    latestKeyDisplay.classList.remove('text-green-400');
                    latestKeyDisplay.classList.add('text-rose-400');
                    
                    metaTier.innerText = "COOLDOWN";
                    metaExpires.innerText = "WAITING WINDOW";
                    metaTimestamp.innerText = timeString;
                }

            } catch (err) {
                console.error("Pipeline failure:", err);
                latestKeyDisplay.innerText = "FETCH ERROR";
                latestKeyDisplay.classList.add('text-rose-400');
            } finally {
                // Clear UI blockers
                generateBtn.disabled = false;
                generateBtn.classList.remove('opacity-75');
                btnIcon.classList.remove('animate-spin');
            }
        }

        generateBtn.addEventListener('click', handleKeyGenerationPipeline);
    </script>
</body>
</html>
